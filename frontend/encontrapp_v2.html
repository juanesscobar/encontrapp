<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>encontrapp — servicios cerca tuyo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; }

    header {
      background: #1a1a2e;
      color: #fff;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,.4);
      z-index: 1000;
      position: relative;
    }
    header h1 { font-size: 1.4rem; letter-spacing: 1px; }
    header h1 span { color: #e94560; }

    .layout { display: flex; height: calc(100vh - 54px); }

    .sidebar {
      width: 360px;
      min-width: 280px;
      background: #fff;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #dde;
      overflow: hidden;
    }
    .controls {
      padding: 14px;
      background: #f8f9fa;
      border-bottom: 1px solid #dde;
    }
    .controls label { font-size: .8rem; color: #555; display: block; margin-bottom: 2px; }
    .controls input[type=range] { width: 100%; accent-color: #e94560; }
    .radio-val { font-weight: 700; color: #e94560; }

    .cat-scroll {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding: 10px 14px;
      border-bottom: 1px solid #dde;
      scrollbar-width: thin;
    }
    .cat-btn {
      background: #eef;
      border: none;
      border-radius: 20px;
      padding: 5px 12px;
      font-size: .78rem;
      cursor: pointer;
      white-space: nowrap;
      transition: background .15s;
    }
    .cat-btn.active { background: #e94560; color: #fff; }

    .results-header {
      padding: 8px 14px;
      font-size: .8rem;
      color: #777;
      border-bottom: 1px solid #eee;
    }
    .cards { overflow-y: auto; flex: 1; padding: 10px; }

    .card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: box-shadow .15s, border-color .15s;
    }
    .card:hover { box-shadow: 0 4px 12px rgba(0,0,0,.12); border-color: #e94560; }
    .card-top { display: flex; align-items: flex-start; gap: 10px; }
    .card-emoji { font-size: 1.8rem; }
    .card-info { flex: 1; min-width: 0; }
    .card-name { font-weight: 700; font-size: .95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-cat { font-size: .75rem; color: #888; }
    .card-dist { font-size: .8rem; font-weight: 600; color: #e94560; margin-top: 4px; }
    .card-desc { font-size: .78rem; color: #555; margin-top: 6px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .card-actions { display: flex; gap: 6px; margin-top: 8px; }
    .btn-wa {
      background: #25d366;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 5px 10px;
      font-size: .75rem;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }
    .rating { font-size: .78rem; color: #f39c12; margin-top: 4px; }

    .empty { text-align: center; padding: 40px 20px; color: #aaa; }
    .spinner { text-align: center; padding: 20px; color: #aaa; font-size: .85rem; }

    #map { flex: 1; }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.5);
      z-index: 2000;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #fff;
      border-radius: 12px;
      padding: 24px;
      width: 340px;
      max-width: 95vw;
    }
    .modal h2 { margin-bottom: 16px; font-size: 1.1rem; }
    .modal input {
      width: 100%; padding: 8px 10px;
      border: 1px solid #ccc; border-radius: 6px;
      margin-bottom: 10px; font-size: .9rem;
    }
    .modal .btn-primary {
      background: #e94560; color: #fff; border: none;
      border-radius: 6px; padding: 10px; width: 100%;
      font-size: .95rem; cursor: pointer;
    }
    .modal .btn-secondary {
      background: #eee; color: #333; border: none;
      border-radius: 6px; padding: 8px; width: 100%;
      font-size: .85rem; cursor: pointer; margin-top: 6px;
    }
    .modal .error { color: #e94560; font-size: .8rem; margin-bottom: 8px; }

    @media (max-width: 600px) {
      .layout { flex-direction: column; }
      .sidebar { width: 100%; height: 45vh; min-width: unset; border-right: none; border-bottom: 1px solid #dde; }
      #map { height: 55vh; }
    }
  </style>
</head>
<body>

<header>
  <h1>encon<span>trapp</span></h1>
  <span style="font-size:.8rem;color:#aaa;flex:1">marketplace hiperlocal</span>
  <button id="btnLoginHeader" style="background:#e94560;color:#fff;border:none;border-radius:6px;padding:6px 14px;cursor:pointer;font-size:.8rem">Ingresar</button>
</header>

<div class="layout">
  <aside class="sidebar">
    <div class="controls">
      <label>Radio de búsqueda: <span class="radio-val" id="radioVal">5</span> km</label>
      <input type="range" id="radioSlider" min="1" max="50" value="5" />
    </div>
    <div class="cat-scroll" id="catScroll">
      <button class="cat-btn active" data-slug="">Todos</button>
    </div>
    <div class="results-header" id="resultsHeader">Buscando tu ubicación…</div>
    <div class="cards" id="cards"><div class="spinner">⏳ Cargando…</div></div>
  </aside>

  <div id="map"></div>
</div>

<!-- Modal Auth -->
<div class="modal-overlay" id="modalAuth">
  <div class="modal">
    <h2 id="modalTitle">Ingresar</h2>
    <div class="error" id="authError"></div>
    <input type="text" id="authNombre" placeholder="Nombre completo" style="display:none" />
    <input type="email" id="authEmail" placeholder="Email" />
    <input type="password" id="authPassword" placeholder="Contraseña" />
    <button class="btn-primary" id="btnAuthSubmit">Ingresar</button>
    <button class="btn-secondary" id="btnAuthToggle">¿No tenés cuenta? Registrate</button>
    <button class="btn-secondary" id="btnAuthClose">Cancelar</button>
  </div>
</div>

<script>
const API = 'http://localhost:8000';
let map, userMarker, infoWindow;
let markers = [];
let userLat = -25.5116, userLng = -54.6105;
let currentToken = localStorage.getItem('token') || null;
let currentUser = null;
let currentCat = '';
let currentRadio = 5;
let isLogin = true;

// ── Google Maps callback ──
window.initMap = function () {
  map = new google.maps.Map(document.getElementById('map'), {
    center: { lat: userLat, lng: userLng },
    zoom: 14,
    mapTypeControl: false,
    fullscreenControl: false,
    streetViewControl: false,
    styles: [
      { featureType: 'poi', elementType: 'labels', stylers: [{ visibility: 'off' }] },
    ],
  });

  infoWindow = new google.maps.InfoWindow();

  // Doble click para mover ubicación
  map.addListener('dblclick', e => {
    userLat = e.latLng.lat();
    userLng = e.latLng.lng();
    buscar();
  });

  // Geolocation
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(pos => {
      userLat = pos.coords.latitude;
      userLng = pos.coords.longitude;
      map.setCenter({ lat: userLat, lng: userLng });
      buscar();
    }, () => buscar());
  } else {
    buscar();
  }
};

// ── Slider ──
document.getElementById('radioSlider').addEventListener('input', e => {
  currentRadio = +e.target.value;
  document.getElementById('radioVal').textContent = currentRadio;
  buscar();
});

// ── Categorías ──
async function loadCategorias() {
  try {
    const r = await fetch(`${API}/categorias`);
    const cats = await r.json();
    const scr = document.getElementById('catScroll');
    cats.forEach(c => {
      const btn = document.createElement('button');
      btn.className = 'cat-btn';
      btn.dataset.slug = c.slug;
      btn.textContent = `${c.emoji} ${c.nombre}`;
      btn.addEventListener('click', () => selectCat(c.slug, btn));
      scr.appendChild(btn);
    });
  } catch {}
}

function selectCat(slug, btn) {
  currentCat = slug;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  buscar();
}

// ── Buscar ──
async function buscar() {
  const url = new URL(`${API}/buscar`);
  url.searchParams.set('lat', userLat);
  url.searchParams.set('lng', userLng);
  url.searchParams.set('radio', currentRadio);
  if (currentCat) url.searchParams.set('categoria', currentCat);

  document.getElementById('cards').innerHTML = '<div class="spinner">⏳ Buscando…</div>';
  clearMarkers();

  try {
    const r = await fetch(url);
    if (!r.ok) throw new Error();
    const proveedores = await r.json();
    renderCards(proveedores);
    renderMarkers(proveedores);
    document.getElementById('resultsHeader').textContent =
      `${proveedores.length} resultado${proveedores.length !== 1 ? 's' : ''} en ${currentRadio} km`;
  } catch {
    document.getElementById('cards').innerHTML =
      '<div class="empty">No se pudo conectar al servidor.<br>¿Está corriendo el backend?</div>';
    document.getElementById('resultsHeader').textContent = 'Sin conexión al servidor';
  }
}

// ── Markers ──
function clearMarkers() {
  markers.forEach(m => m.setMap(null));
  markers = [];
  if (userMarker) userMarker.setMap(null);
}

function renderMarkers(proveedores) {
  proveedores.forEach(p => {
    const pos = { lat: p.lat, lng: p.lng };

    // Marcador con emoji como label
    const marker = new google.maps.Marker({
      position: pos,
      map,
      label: {
        text: p.categoria_emoji || '📍',
        fontSize: '22px',
        fontFamily: 'Segoe UI Emoji',
      },
      icon: {
        path: google.maps.SymbolPath.CIRCLE,
        scale: 18,
        fillColor: '#ffffff',
        fillOpacity: 0.9,
        strokeColor: '#e94560',
        strokeWeight: 2,
      },
      title: p.nombre_negocio,
    });

    const dist = p.distancia_metros < 1000
      ? `${Math.round(p.distancia_metros)} m`
      : `${(p.distancia_metros / 1000).toFixed(1)} km`;

    marker.addListener('click', () => {
      infoWindow.setContent(`
        <div style="font-family:'Segoe UI',sans-serif;max-width:220px">
          <b style="font-size:.95rem">${p.nombre_negocio}</b><br>
          <span style="color:#888;font-size:.8rem">${p.categoria_emoji} ${p.categoria_nombre}</span><br>
          <span style="color:#e94560;font-weight:600;font-size:.82rem">${dist}</span>
          ${p.telefono ? `<br><span style="font-size:.8rem">📞 ${p.telefono}</span>` : ''}
          ${p.whatsapp ? `<br><a href="https://wa.me/${p.whatsapp.replace(/\D/g,'')}" target="_blank"
            style="color:#25d366;font-size:.8rem">💬 WhatsApp</a>` : ''}
        </div>
      `);
      infoWindow.open(map, marker);
    });

    markers.push(marker);
  });

  // Marcador del usuario
  userMarker = new google.maps.Marker({
    position: { lat: userLat, lng: userLng },
    map,
    icon: {
      path: google.maps.SymbolPath.CIRCLE,
      scale: 10,
      fillColor: '#e94560',
      fillOpacity: 1,
      strokeColor: '#fff',
      strokeWeight: 3,
    },
    title: 'Tu ubicación',
    zIndex: 999,
  });
}

// ── Cards ──
function renderCards(proveedores) {
  const container = document.getElementById('cards');
  if (!proveedores.length) {
    container.innerHTML = '<div class="empty">😕 No hay resultados en esta zona.<br>Ampliá el radio.</div>';
    return;
  }
  container.innerHTML = proveedores.map(p => {
    const dist = p.distancia_metros < 1000
      ? `${Math.round(p.distancia_metros)} m`
      : `${(p.distancia_metros / 1000).toFixed(1)} km`;
    const stars = p.rating_promedio > 0
      ? '★'.repeat(Math.round(p.rating_promedio)) + ` ${p.rating_promedio.toFixed(1)}`
      : '';
    const wa = p.whatsapp
      ? `<a class="btn-wa" href="https://wa.me/${p.whatsapp.replace(/\D/g,'')}" target="_blank">💬 WhatsApp</a>`
      : '';
    return `
      <div class="card" onclick="flyTo(${p.lat},${p.lng})">
        <div class="card-top">
          <div class="card-emoji">${p.categoria_emoji || '📍'}</div>
          <div class="card-info">
            <div class="card-name">${p.nombre_negocio}</div>
            <div class="card-cat">${p.categoria_nombre || ''}</div>
            <div class="card-dist">${dist}</div>
          </div>
        </div>
        ${p.descripcion ? `<div class="card-desc">${p.descripcion}</div>` : ''}
        ${stars ? `<div class="rating">${stars} (${p.total_resenas} reseña${p.total_resenas !== 1 ? 's' : ''})</div>` : ''}
        <div class="card-actions">${wa}</div>
      </div>`;
  }).join('');
}

function flyTo(lat, lng) {
  map.panTo({ lat, lng });
  map.setZoom(16);
}

// ── Auth ──
document.getElementById('btnLoginHeader').addEventListener('click', () => {
  if (currentToken) { logout(); return; }
  openModal(true);
});

function openModal(login) {
  isLogin = login;
  document.getElementById('modalTitle').textContent = login ? 'Ingresar' : 'Registrarse';
  document.getElementById('authNombre').style.display = login ? 'none' : 'block';
  document.getElementById('btnAuthToggle').textContent = login
    ? '¿No tenés cuenta? Registrate'
    : '¿Ya tenés cuenta? Ingresá';
  document.getElementById('authError').textContent = '';
  document.getElementById('modalAuth').classList.add('open');
}

document.getElementById('btnAuthClose').addEventListener('click', () => {
  document.getElementById('modalAuth').classList.remove('open');
});
document.getElementById('btnAuthToggle').addEventListener('click', () => openModal(!isLogin));

document.getElementById('btnAuthSubmit').addEventListener('click', async () => {
  const email    = document.getElementById('authEmail').value.trim();
  const password = document.getElementById('authPassword').value;
  const nombre   = document.getElementById('authNombre').value.trim();
  const errEl    = document.getElementById('authError');

  try {
    if (isLogin) {
      const r = await fetch(`${API}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
      });
      if (!r.ok) { errEl.textContent = 'Email o contraseña incorrectos.'; return; }
      currentToken = (await r.json()).access_token;
      localStorage.setItem('token', currentToken);
    } else {
      if (!nombre) { errEl.textContent = 'Ingresá tu nombre.'; return; }
      const r = await fetch(`${API}/auth/registro`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nombre, email, password }),
      });
      if (!r.ok) { errEl.textContent = (await r.json()).detail || 'Error al registrarse.'; return; }
      const lr = await fetch(`${API}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
      });
      currentToken = (await lr.json()).access_token;
      localStorage.setItem('token', currentToken);
    }
    document.getElementById('modalAuth').classList.remove('open');
    updateAuthUI();
  } catch {
    errEl.textContent = 'Error de conexión.';
  }
});

async function updateAuthUI() {
  if (!currentToken) { document.getElementById('btnLoginHeader').textContent = 'Ingresar'; return; }
  try {
    const r = await fetch(`${API}/auth/me`, { headers: { Authorization: `Bearer ${currentToken}` } });
    if (!r.ok) { logout(); return; }
    currentUser = await r.json();
    document.getElementById('btnLoginHeader').textContent = `👤 ${currentUser.nombre.split(' ')[0]}`;
  } catch { logout(); }
}

function logout() {
  currentToken = null; currentUser = null;
  localStorage.removeItem('token');
  document.getElementById('btnLoginHeader').textContent = 'Ingresar';
}

// ── Boot ──
loadCategorias();
updateAuthUI();
</script>

<!-- Google Maps API -->
<script
  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAnn2mJCxnR7d5DgR8rSK2fi_r4guqwifA&callback=initMap&language=es&region=PY"
  async defer>
</script>

</body>
</html>
